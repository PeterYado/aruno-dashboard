name: Fetch RSS Data

on:
  schedule:
    - cron: '0 * * * *'  # 1時間ごと
  workflow_dispatch:       # 手動トリガー

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch News RSS
        run: |
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (compatible; Googlebot/2.1)" \
            -H "Accept: application/rss+xml, application/xml, text/xml" \
            "https://news.google.com/rss/search?q=%E4%B8%AD%E8%A5%BF%E3%82%A2%E3%83%AB%E3%83%8E%20%E4%B9%83%E6%9C%A8%E5%9D%8246&hl=ja&gl=JP&ceid=JP:ja" \
            -o /tmp/news.xml || echo "News fetch failed"

          node -e "
          const fs = require('fs');
          const xml = fs.readFileSync('/tmp/news.xml', 'utf8');
          const items = [];
          const itemReg = /<item>([\s\S]*?)<\/item>/g;
          let m;
          while ((m = itemReg.exec(xml)) !== null) {
            const block = m[1];
            const title = (block.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/) || block.match(/<title>(.*?)<\/title>/) || [])[1] || '';
            const link  = (block.match(/<link>(.*?)<\/link>/)  || [])[1] || '#';
            const pub   = (block.match(/<pubDate>(.*?)<\/pubDate>/) || [])[1] || '';
            const src   = (block.match(/<source[^>]*>(.*?)<\/source>/) || [])[1] || '';
            if (title) items.push({ title, link, pub, src });
          }
          const ARUNO_RE = /中西アルノ|アルノ|[Aa]runo/;
          const filtered = items.filter(x => ARUNO_RE.test(x.title));
          const result = filtered.length >= 3 ? filtered : items;
          result.sort((a,b) => new Date(b.pub||0) - new Date(a.pub||0));
          fs.writeFileSync('data/news.json', JSON.stringify({ updated: new Date().toISOString(), items: result }, null, 2));
          console.log('News items:', result.length);
          "

      - name: Fetch YouTube RSS
        run: |
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (compatible; Googlebot/2.1)" \
            "https://www.youtube.com/feeds/videos.xml?channel_id=UCfvohDfHt1v5N8l3BzPRsWQ" \
            -o /tmp/youtube.xml || echo "YouTube fetch failed"

          node -e "
          const fs = require('fs');
          const xml = fs.readFileSync('/tmp/youtube.xml', 'utf8');
          const entries = [];
          const entryReg = /<entry>([\s\S]*?)<\/entry>/g;
          let m;
          while ((m = entryReg.exec(xml)) !== null) {
            const block = m[1];
            const videoId = (block.match(/<yt:videoId>(.*?)<\/yt:videoId>/) || [])[1] || '';
            const title   = (block.match(/<title>(.*?)<\/title>/) || [])[1] || '';
            const published = (block.match(/<published>(.*?)<\/published>/) || [])[1] || '';
            const thumb   = videoId ? 'https://i.ytimg.com/vi/' + videoId + '/mqdefault.jpg' : '';
            if (videoId && title) entries.push({ videoId, title, published, thumb });
          }
          const KEYWORDS = ['中西', 'アルノ', '5期生', '5期', 'aruno', 'nakanishi'];
          const aruno = entries.filter(v => KEYWORDS.some(kw => v.title.toLowerCase().includes(kw.toLowerCase())));
          const rest  = entries.filter(v => !KEYWORDS.some(kw => v.title.toLowerCase().includes(kw.toLowerCase())));
          const result = [...aruno, ...rest];
          fs.writeFileSync('data/youtube.json', JSON.stringify({ updated: new Date().toISOString(), items: result }, null, 2));
          console.log('YouTube items:', result.length);
          "

      - name: Fetch Blog
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');

          function get(url) {
            return new Promise((resolve, reject) => {
              https.get(url, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  'Accept': 'text/html,application/xhtml+xml',
                  'Accept-Language': 'ja,en;q=0.9',
                }
              }, (res) => {
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  return resolve(get(res.headers.location));
                }
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          async function main() {
            const BASE = 'https://tools.yotujoho.com/blog/nogizaka46/n-55395/';
            const allPosts = [];
            const seenTitles = new Set();
            const seenIds = new Set();

            for (let page = 1; page <= 5; page++) {
              const url = page === 1 ? BASE : BASE + '?page=' + page;
              try {
                const html = await get(url);
                if (!html || html.length < 100) break;

                const h3s = [...html.matchAll(/<h3[^>]*>([\s\S]*?)<\/h3>/g)]
                  .map(m => m[1].replace(/<[^>]+>/g, '').trim())
                  .filter(t => t.length > 1 && t.length < 80 && !t.includes('Recent') && !t.includes('Archive') && !t.includes('坂道'));

                const imgMatches  = [...html.matchAll(/https:\/\/yotujoho\.com\/blog-data\/nogizaka46\/image\/(\d+)\/small\/0\.jpg/g)];
                const linkMatches = [...html.matchAll(/nogizaka46\.com\/s\/n46\/diary\/detail\/(\d+)/g)];
                const dateMatches = [...html.matchAll(/(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2})/g)];

                const uniqueLinks = [];
                for (const m of linkMatches) {
                  if (!seenIds.has(m[1])) { seenIds.add(m[1]); uniqueLinks.push(m); }
                }

                const count = Math.min(h3s.length, imgMatches.length);
                let added = 0;
                for (let i = 0; i < count; i++) {
                  const title = h3s[i];
                  if (!title || seenTitles.has(title)) continue;
                  seenTitles.add(title);
                  const imgSrc = imgMatches[i]?.[0] || '';
                  const articleId = uniqueLinks[i]?.[1] || '';
                  const rawDate = dateMatches[i]?.[1] || '';
                  let dateStr = '';
                  if (rawDate) {
                    const p = rawDate.match(/(\d{4})\/(\d{2})\/(\d{2})\s+(\d{2}):(\d{2})/);
                    if (p) dateStr = new Date(+p[1], +p[2]-1, +p[3], +p[4], +p[5]).toISOString();
                  }
                  allPosts.push({
                    title,
                    thumb: imgSrc,
                    date: dateStr,
                    link: articleId
                      ? 'https://www.nogizaka46.com/s/n46/diary/detail/' + articleId
                      : 'https://www.nogizaka46.com/s/n46/diary/MEMBER/list?ct=55395',
                  });
                  added++;
                }
                console.log('Blog page ' + page + ': +' + added + ' posts (total: ' + allPosts.length + ')');
                if (!html.includes('page=') && !html.includes('次へ')) break;
                if (added === 0) break;
                await new Promise(r => setTimeout(r, 500));
              } catch(e) {
                console.error('Blog page ' + page + ' error:', e.message);
                break;
              }
            }
            fs.writeFileSync('data/blog.json', JSON.stringify({ updated: new Date().toISOString(), items: allPosts }, null, 2));
            console.log('Blog total:', allPosts.length);
          }
          main();
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/youtube.json data/blog.json
          git diff --cached --quiet || git commit -m "chore: update RSS data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
